ext {
    extName = 'Buondua'
    extClass = '.Buondua'
    extVersionCode = 1
    isNsfw = true
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    compileSdkVersion 34
    defaultConfig {
        applicationId "eu.kanade.tachiyomi.extension.all.buondua"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode extVersionCode
        versionName "1.0"
        multiDexEnabled true
    }
    // ... 其他标准配置
}